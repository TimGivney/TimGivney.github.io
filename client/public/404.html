<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // SPA fallback: GitHub Pages serves this file for unknown paths. For known
      // client-side routes, bounce to the app (which restores the URL); otherwise
      // show the branded 404 below.
      (function () {
        var spaRoutes = ["/cube"];
        var path = location.pathname.replace(/\/$/, "");
        if (spaRoutes.indexOf(path) !== -1) {
          sessionStorage.setItem("spaRedirect", path + location.search + location.hash);
          location.replace("/");
        }
      })();
    </script>
    <title>Page Not Found - Tim Givney</title>
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#1B3F6B" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:wght@400;600&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cobalt: #1b3f6b;
        --gold: #c9a84c;
        --bg: #eef3f9;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: "Source Sans 3", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        min-height: 100vh;
      }
      .card { max-width: 34rem; text-align: center; }
      .code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 1rem;
      }
      h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 800;
        font-size: clamp(4rem, 18vw, 8rem);
        line-height: 1;
        color: var(--cobalt);
      }
      h2 {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 700;
        font-size: clamp(1.4rem, 5vw, 2rem);
        color: var(--cobalt);
        margin: 0.5rem 0 1rem;
      }
      .divider {
        width: 5rem;
        height: 4px;
        background: var(--gold);
        margin: 1.25rem auto;
        border-radius: 2px;
      }
      p { font-size: 1.05rem; color: #4b5563; margin-bottom: 2rem; }
      .btn {
        display: inline-block;
        background: var(--cobalt);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 0.85rem 1.75rem;
        border-radius: 0.5rem;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      .btn:hover { transform: translateY(-2px); background: #16335a; }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="code">Error 404</p>
      <h1>404</h1>
      <h2>Page not found</h2>
      <div class="divider"></div>
      <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
      <a class="btn" href="/">← Back to home</a>
    </main>
  </body>
</html>
