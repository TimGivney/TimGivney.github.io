name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: SPA + Jekyll fallbacks
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Package downloadable site ZIP
        run: |
          cat > dist/HOW-TO-OPEN.txt <<'EOF'
          Tim Givney - website (offline copy)

          This folder is the complete website. Because it is a modern web app,
          double-clicking index.html may not render due to browser security on
          local files. To view it, run a simple web server from this folder:

            python3 -m http.server 8000

          then open http://localhost:8000 in your browser.
          EOF
          (cd dist && zip -r -q ../timgivney-website.zip . -x "*.zip")
          rm dist/HOW-TO-OPEN.txt
          mv timgivney-website.zip dist/timgivney-website.zip

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
